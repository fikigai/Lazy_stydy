name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run Build
        run: npm run build
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          NODE_ENV: production
          PORT: 1234

  analysis:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Важливо для SonarQube, щоб бачити історію коммітів

      # 1. Перевірка код-рев'ю
      - name: Перевірка наявності схваленого код-рев’ю
        uses: actions/github-script@v6
        with:
          script: |
            if (!context.payload.pull_request) {
              console.log("⚠️ Це не Pull Request. Пропускаємо перевірку рев'ю.");
              return;
            }

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const approved = reviews.some(review => review.state === 'APPROVED');

            if (!approved) {
              // Для навчальних цілей можна виводити warning замість помилки, 
              // якщо ти працюєш один, але для лаби краще залишити setFailed
              core.setFailed("❌ Код-рев’ю не схвалено! Потрібен статус APPROVED.");
            }

      # 2. Збір метрик (Cloc)
      - name: Count lines of code with Cloc
        run: |
          sudo apt-get install -y cloc
          cloc src/ > cloc-report.txt
          cat cloc-report.txt

      # 3. Статичний аналіз SonarQube
      - name: Run SonarQube analysis
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          # Додаємо аргументи безпосередньо, щоб уникнути помилок URI
          args: >
            -Dsonar.projectKey=Lazy_stydy
            -Dsonar.sources=src

      # 4. Перевірка змін у гілці develop
      - name: Перевірка змін у гілці develop
        run: |
          git fetch origin develop
          git log origin/develop --oneline -n 5 > develop_changes.txt || echo "No develop branch yet"
          cat develop_changes.txt
