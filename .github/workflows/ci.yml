name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run Build
        run: npm run build
        env:
          # Передаємо змінні з секретів у середовище GitHub Runner
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          NODE_ENV: production
          PORT: 1234